version: 2

models:
  - name: stg_products
    description: "Staged products from raw staging table"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: unit_price
        tests:
          - not_null

  - name: stg_stores
    description: "Staged stores from raw staging table"
    columns:
      - name: store_id
        tests:
          - unique
          - not_null

  - name: stg_customers
    description: "Staged customers from raw staging table"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_sales
    description: "Staged sales transactions from raw staging table"
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null